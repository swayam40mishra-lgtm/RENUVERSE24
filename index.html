<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Screen 1 (Landing) -->
<section id="screen1" class="screen active">
  <div class="card">
    <h1 class="fade" id="t1">Received parcel</h1>
    <p class="fade sub" id="t2">Hope you are doing well.</p>
  </div>
</section>

<!-- Screen 2 (Lyrics + Audio starts here) -->
<section id="screen2" class="screen">
  <div class="card">
    
    <p class="fade sub" id="t3">
      Just listen closely… these lyrics say everything I couldn’t.
    </p>

    <!-- Lyrics -->
    <div class="lyrics">
      <p class="lyric" id="l1">Mahi mainu chadyoo na</p>
      <p class="lyric" id="l2">Ki tere bin dil naiyo lagna</p>
      <p class="lyric" id="l3">Jithe vi tu chalna ae</p>
      <p class="lyric" id="l4">Mahi main tere piche piche chalna</p>
    </div>

    <!-- AUDIO -->
    <audio id="player" preload="auto" playsinline>
      <!-- Local file -->
      <source src="assets/audio/ve-mahi.mp3" type="audio/mpeg">

      <!-- OR Catbox (use one only) -->
      <!-- <source src="https://files.catbox.moe/xxxxx.mp3" type="audio/mpeg"> -->
    </audio>

  </div>
</section>

<!-- Screen 3 -->
<section id="screen3" class="screen">
  <div class="card final">
    <button id="btn">Click here to Unblock Me</button>

    <p class="fade sub" id="finalText">
      If you ever feel like it… you can unblock me.<br>
      And maybe drop a message.
    </p>
  </div>
</section>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
